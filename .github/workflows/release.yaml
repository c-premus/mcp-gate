name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  DOCKERHUB_IMAGE: cpremus/mcp-gate
  GHCR_IMAGE: ghcr.io/c-premus/mcp-gate

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race ./...

  release:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest Docker Hub image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: docker.io/${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa  # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          short-description: "OAuth 2.1 reverse proxy for MCP servers"

      - name: Clean up old GHCR versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55  # v5.0.0
        continue-on-error: true
        with:
          package-name: mcp-gate
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true

      - name: Clean up old Docker Hub tags and images
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -uo pipefail
          NAMESPACE="cpremus"
          IMAGE="mcp-gate"
          KEEP=5

          # Authenticate — fail fast with diagnostic output
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "::error::Docker Hub login failed (HTTP ${HTTP_CODE})"
            exit 1
          fi
          HUB_TOKEN=$(echo "${BODY}" | jq -r .token)

          # Step 1: Delete old tags (keeps latest KEEP by last_updated)
          echo "Fetching tags..."
          TAGS=$(curl -sf "https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/?page_size=100" \
            -H "Authorization: Bearer ${HUB_TOKEN}" \
            | jq -r "[.results | sort_by(.last_updated) | reverse | .[${KEEP}:][] | .name] | .[]") || true

          if [ -n "${TAGS}" ]; then
            for TAG in ${TAGS}; do
              echo "Removing tag ${IMAGE}:${TAG}"
              curl -sf -X DELETE "https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/${TAG}/" \
                -H "Authorization: Bearer ${HUB_TOKEN}" || echo "  Warning: failed to delete tag ${TAG}"
            done
          else
            echo "No old tags to remove (≤${KEEP} tags)"
          fi

          # Step 2: Delete inactive images via Advanced Image Management API
          # status=inactive returns manifests with no tags AND not referenced by any tagged manifest
          echo "Fetching inactive images..."
          DIGESTS=$(curl -sf \
            "https://hub.docker.com/v2/namespaces/${NAMESPACE}/repositories/${IMAGE}/images?status=inactive&page_size=100&ordering=-last_activity" \
            -H "Authorization: Bearer ${HUB_TOKEN}" \
            | jq -r '[.results[].digest] | .[]') || true

          if [ -z "${DIGESTS}" ]; then
            echo "No inactive images to clean up"
            exit 0
          fi

          # Bulk delete by digest — actually reclaims storage
          MANIFESTS=$(echo "${DIGESTS}" \
            | jq -Rsc '[split("\n") | .[] | select(length > 0) | {repository: "'"${IMAGE}"'", digest: .}]')
          COUNT=$(echo "${DIGESTS}" | grep -c . || true)

          echo "Deleting ${COUNT} inactive image(s)"
          curl -sf -X POST \
            "https://hub.docker.com/v2/namespaces/${NAMESPACE}/repositories/${IMAGE}/images/delete" \
            -H "Authorization: Bearer ${HUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"manifests\": ${MANIFESTS}, \"dry_run\": false}" || echo "Warning: bulk delete failed"

          echo "Docker Hub cleanup complete"
